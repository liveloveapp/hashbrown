name: NPM Publish

on:
  push:
    tags:
      - npm/preview
      - npm/latest

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install npm 11 for trusted publishing
        run: npm install -g npm@11

      - name: Determine affected base
        uses: nrwl/nx-set-shas@v3

      - name: Install dependencies
        run: npm ci

      - name: Determine release channel
        id: channel
        run: |
          case "${GITHUB_REF_NAME}" in
            npm/preview)
              echo "dist_tag=next" >> "$GITHUB_OUTPUT"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              ;;
            npm/latest)
              echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Lint and test affected projects
        run: npx nx affected -t lint,test --parallel=3

      - name: Verify atomic release versions
        run: node scripts/verify-release-versions.mjs

      - name: Build release packages
        run: npx nx run-many -t build -p angular anthropic azure bedrock core google ollama openai react writer --parallel=3

      - name: Publish packages
        run: npx nx release publish --tag=${{ steps.channel.outputs.dist_tag }}

      - name: Create GitHub release
        if: steps.channel.outputs.create_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tagName = context.ref.replace('refs/tags/', '');
            const releaseName = `Hashbrown npm latest (${tagName})`;

            try {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body: 'Automated npm publish triggered by tag push.',
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status === 422) {
                core.warning('Release already exists for this tag; skipping creation.');
                return;
              }
              throw error;
            }

  deploy-cloudflare-production:
    name: Deploy Cloudflare production
    if: github.ref_name == 'npm/latest'
    needs: publish
    uses: ./.github/workflows/cloudflare-production.yml
    with:
      deploy_samples: true
      deploy_www: true
    secrets: inherit
