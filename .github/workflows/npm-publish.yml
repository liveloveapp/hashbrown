name: NPM Publish

on:
  push:
    tags:
      - npm/preview
      - npm/latest

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install npm 11 for trusted publishing
        run: npm install -g npm@11

      - name: Determine affected base
        uses: nrwl/nx-set-shas@v3

      - name: Install dependencies
        run: npm ci

      - name: Determine release channel
        id: channel
        run: |
          case "${GITHUB_REF_NAME}" in
            npm/preview)
              echo "dist_tag=next" >> "$GITHUB_OUTPUT"
              ;;
            npm/latest)
              echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Lint and test affected projects
        run: npx nx affected -t lint,test --parallel=3

      - name: Verify atomic release versions
        run: node scripts/verify-release-versions.mjs

      - name: Build release packages
        run: npx nx run-many -t build -p angular anthropic azure bedrock core google ollama openai react writer --parallel=3

      - name: Publish packages
        run: npx nx release publish --tag=${{ steps.channel.outputs.dist_tag }} --access=public --parallel=1

      - name: Verify npm release
        run: node scripts/verify-npm-release.mjs --tag=${{ steps.channel.outputs.dist_tag }}

  deploy-cloudflare-production:
    name: Deploy Cloudflare production
    if: github.ref_name == 'npm/latest'
    needs: publish
    uses: ./.github/workflows/cloudflare-production.yml
    with:
      deploy_samples: true
      deploy_www: true
    secrets: inherit
